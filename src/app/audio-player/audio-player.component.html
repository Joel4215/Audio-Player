<div class="audio-player-card">
  <div class="audio-player-header">
    <span class="track-name">{{ fileName || 'Song Name Here' }}</span>

    <div class="control-group">
      <button mat-icon-button (click)="toggleMute()" [attr.aria-label]="isMuted ? 'Unmute' : 'Mute'">
        <mat-icon>{{ isMuted ? 'volume_off' : 'volume_up' }}</mat-icon>
      </button>
      <button mat-icon-button (click)="togglePlay()" [attr.aria-label]="isPlaying ? 'Pause' : 'Play'">
        <mat-icon>{{ isPlaying ? 'pause' : 'play_circle' }}</mat-icon>
      </button>
    </div>
  </div>

  <audio #player [src]="fileUrl"></audio>
</div>

<cr-file-upload (fileSelected)="onFileSelected($event)"></cr-file-upload>

<div class="recently-played">
  <h2>Recently Played</h2>
  <ul>
<li *ngFor="let song of songs">
  <div class="recent-item">
    <div class="song-name" (click)="loadSong(song)">
      {{ song.name }}
    </div>
    <button mat-icon-button (click)="removeSong(song)">
      <mat-icon>delete</mat-icon>
    </button>
  </div>
</li>
  </ul>
</div>
